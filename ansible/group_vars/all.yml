ubuntu_config:
  user:
    # Default: current sudo user, then USER, then root.
    name:
    # Default: /home/<name>.
    home:
    # Default: <home>/Documents/dev-projects.
    projects_directory:
    # Default: <home>/.local/state/ubuntu-config-v1.
    state_dir:

  system:
    # Default: /etc/ubuntu-config-v1.
    state_dir:
    # Default workstation locale.
    locale: en_US.UTF-8
    # Default workstation timezone.
    timezone: Europe/Paris
    packages:
      # Base packages needed before higher-level package stories run.
      prerequisites:
        - locales
        - tzdata
      # Ubuntu repository packages and vendor-managed APT packages.
      apt:
        - htop
        - gh
        - xdg-utils
        - google-chrome-stable
      # Refresh APT metadata when the cache is older than this many seconds.
      cache_valid_time: 86400
    repositories:
      # Vendor APT repository declarations include explicit source and keyrings.
      apt:
        - name: github-cli
          source: >-
            deb [signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg]
            https://cli.github.com/packages stable main
          keyring:
            url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
            path: /usr/share/keyrings/githubcli-archive-keyring.gpg
        - name: google-chrome
          source: >-
            deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-signing-key.asc]
            https://dl.google.com/linux/chrome/deb/ stable main
          keyring:
            url: https://dl.google.com/linux/linux_signing_key.pub
            path: /usr/share/keyrings/google-linux-signing-key.asc
    # Extra system directories managed with root ownership by default.
    directories: []
    services:
      # Services to enable when later stories require them.
      enabled: []
      # Services to disable when later stories require them.
      disabled: []
    settings:
      # Machine-wide sysctl values.
      sysctl:
        fs.inotify.max_user_watches: "524288"

  desktop:
    flatpak:
      # Flatpak stays enabled by default for desktop applications.
      enabled: true
      # Default remote for managed Flatpak applications.
      remote: flathub
      packages:
        - com.bitwarden.desktop
    browser:
      # The primary browser is expected to become the default browser.
      default: true
      # Declared profiles for the single primary browser workflow.
      profiles: []
      # Generated browser policy inputs.
      policies: {}
    gnome:
      # Apply dark style preference when GNOME settings are implemented.
      dark_mode: true
      favorites: []

  development:
    # Core developer tools installed from APT or vendor repositories.
    packages: []
    # Optional GUI editor packages, usually delivered by Flatpak.
    editor_packages: []
    git:
      default_branch: main
      editor: nvim
      signing:
        enabled: false
    runtimes: {}

  user_config:
    # Explicit managed files under the user home or XDG config paths.
    files: []
    shell:
      aliases: {}
      environment: {}
      # Unmanaged shell fragment preserved across re-apply.
      local_override_path: .config/ubuntu-config/local.zsh

  secrets:
    # Secret restoration stays opt-in for CI and non-interactive installs.
    enabled: false
    provider: bitwarden
    bitwarden:
      server: https://vault.bitwarden.eu
      ssh_keys: []
      gpg_keys: []
      browser_recovery_items: []
