---
locale: en_US.UTF-8
timezone: Europe/Paris
web_browser: org.chromium.Chromium.desktop

# Desktop favorites
favorites:
  - gnome-control-center.desktop
  - org.gnome.Nautilus.desktop
  - org.gnome.Terminal.desktop
  - org.chromium.Chromium.desktop
  - com.visualstudio.code.desktop
  - com.slack.Slack.desktop
  - com.spotify.Client.desktop

# HOST LAYER - Core system packages only
apt_packages:
  # Core system essentials
  - apt-transport-https
  - ca-certificates
  - gnupg-agent
  - software-properties-common
  - util-linux-extra
  - systemd
  - hwclock
  - dconf-cli
  # Essential tools
  - curl
  - wget
  - unzip
  - cron
  # Monitoring
  - htop

# DESKTOP LAYER - Desktop applications via APT (minimal)
desktop_packages:
  # Desktop applications (moved from setup_desktop role)
  - copyq
  - simple-scan
  - deja-dup
  - vlc
  # System maintenance
  - ucaresystem-core
  # Development tools (moved from snap)
  - helm
  # Fonts
  - fonts-firacode

# DESKTOP LAYER - Applications via Flatpak
flatpak_packages:
  # Development
  - com.visualstudio.code
  # Communication
  - com.slack.Slack
  # Media
  - com.spotify.Client
  - org.videolan.VLC
  # Browsers
  - org.chromium.Chromium
  # Utilities
  - org.jdownloader.JDownloader
  - com.github.hluk.copyq
  - org.gnome.SimpleScan
  - org.gnome.DejaDup
  # Password Management
  - com.bitwarden.desktop

# PROJECT LAYER - Development dependencies now managed via Nix flakes
# per project

# USER LAYER - Secrets management (Bitwarden CLI via Home Manager)
bitwarden:
  server: "https://vault.bitwarden.eu"
  email: "{{ BITWARDEN_EMAIL | default('') }}"
  password: "{{ BITWARDEN_PASSWORD | default('') }}"
  client_id: "{{ BITWARDEN_CLIENT_ID | default('') }}"
  client_secret: "{{ BITWARDEN_CLIENT_SECRET | default('') }}"
  # gitleaks:allow - it is an ID
  sshKeysCollectionId: "7ac0c067-9d61-49c0-b01e-b10d0135372a"
  # gitleaks:allow - it is an ID
  gpgKeysCollectionId: "9ff2a152-3c88-44cd-a04b-b11d00c8b267"
