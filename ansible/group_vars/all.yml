---
locale: en_US.UTF-8
timezone: Europe/Paris
web_browser: org.chromium.Chromium.desktop

# Desktop favorites
favorites:
  - gnome-control-center.desktop
  - org.gnome.Nautilus.desktop
  - org.gnome.Terminal.desktop
  - org.chromium.Chromium.desktop
  - com.visualstudio.code.desktop
  - com.slack.Slack.desktop
  - com.spotify.Client.desktop

# HOST LAYER - Core system packages only
apt_packages:
  # Core system essentials
  - apt-transport-https
  - ca-certificates
  - gnupg-agent
  - software-properties-common
  - dconf-cli
  - util-linux-extra
  - systemd
  - hwclock
  - htop
  # Essential tools
  - cron
  - curl
  - wget
  - unzip

# DESKTOP LAYER - Desktop applications via APT (migrating to Flatpak)
desktop_packages:
  # Shell tools (moving to user layer)
  - bat
  - zsh
  - thefuck
  - fonts-firacode
  # Desktop applications (migrating to Flatpak)
  - copyq
  - chromium-browser
  - simple-scan
  - deja-dup
  - vlc
  # System maintenance
  - ucaresystem-core
  # Development tools (moved from snap)
  - helm

# DESKTOP LAYER - Applications via Flatpak
flatpak_packages:
  # Development
  - com.visualstudio.code
  # Communication
  - com.slack.Slack
  # Media
  - com.spotify.Client
  # Browsers
  - org.chromium.Chromium
  # Utilities
  - org.jdownloader.JDownloader
  # Password Management
  - com.bitwarden.desktop

# USER LAYER - Shell configuration (will move to Home Manager)
zsh:
  plugins:
    - thefuck
    - git
    - yarn
    - nvm
    - command-not-found
    - docker
    - docker-compose
    - composer
    - aws
    - pre-commit
  aliases:
    - {alias: "cat", command: "batcat -pp"}
    # Enforce security for git aliases
    - {
      alias: "ggl",
      command: 'echo \"\e[31mUse \e[1;31mggfl\e[0m!\" && return 1',
    }
    - {
      alias: "gcam",
      command: 'echo \"\e[31mUse \e[1;31mgcasm\e[0m!\" && return 1',
    }
    - {
      alias: "gcan!",
      command: 'echo \"\e[31mUse \e[1;31mgcans!\e[0m!\" && return 1',
    }

# USER LAYER - Git configuration (will move to Home Manager)
git:
  name: "Emilien Escalle"
  email: "emilien.escalle@escemi.com"
  signingKey: ""
  includes:
    - clients/allopneus

# PROJECT LAYER - Development dependencies (will use Nix flakes)
yarn:
  packages: []

composer:
  packages: []

# USER LAYER - Secrets management
bitwarden:
  server: "https://vault.bitwarden.eu"
  email: "{{ BITWARDEN_EMAIL | default('') }}"
  password: "{{ BITWARDEN_PASSWORD | default('') }}"
  client_id: "{{ BITWARDEN_CLIENT_ID | default('') }}"
  client_secret: "{{ BITWARDEN_CLIENT_SECRET | default('') }}"
  # gitleaks:allow - it is an ID
  sshKeysCollectionId: "7ac0c067-9d61-49c0-b01e-b10d0135372a"
  # gitleaks:allow - it is an ID
  gpgKeysCollectionId: "9ff2a152-3c88-44cd-a04b-b11d00c8b267"
