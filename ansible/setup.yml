---
- name: Setup personal computer with Clean Architecture layers
  hosts: personal_computer
  become: true
  vars:
    ansible_config_dir: "/home/ansible/config"

  tasks:
    - name: Get facts on current container
      community.docker.current_container_facts:

    # HOST LAYER - Essential system packages and configuration
    - name: Setup base system
      ansible.builtin.import_role:
        name: setup_base
      tags: [base, host]
      vars:
        setup_base_packages: "{{ apt_packages | default([]) }}"

    - name: Setup APT packages
      ansible.builtin.import_role:
        name: setup_apt
      tags: [apt, host]
      vars:
        setup_apt_packages: "{{ apt_packages }}"

    # DESKTOP LAYER - GUI applications and desktop environment
    - name: Setup Flatpak applications
      ansible.builtin.import_role:
        name: setup_flatpak
      tags: [flatpak, desktop]
      vars:
        setup_flatpak_packages: "{{ flatpak_packages | default([]) }}"

    - name: Setup desktop applications
      ansible.builtin.import_role:
        name: setup_desktop
      tags: [desktop, gnome]
      vars:
        setup_desktop_packages: "{{ desktop_packages | default([]) }}"

    # PROJECT LAYER BOOTSTRAP - Nix for project environments
    - name: Setup Nix package manager
      ansible.builtin.import_role:
        name: setup_nix
      tags: [nix, project]

    - name: Setup Home Manager for user configurations
      ansible.builtin.import_role:
        name: setup_home_manager
      tags: [home-manager, user]
      become: false

    # USER LAYER - User-specific configurations
    - name: Setup keys
      ansible.builtin.import_role:
        name: setup_keys
      tags: [keys, user]
      vars:
        setup_keys_bitwarden_server: "{{ bitwarden.server }}"
        setup_keys_bitwarden_email: "{{ bitwarden.email }}"
        setup_keys_bitwarden_password: "{{ bitwarden.password }}"
        setup_keys_bitwarden_client_id: "{{ bitwarden.client_id }}"
        setup_keys_bitwarden_client_secret: "{{ bitwarden.client_secret }}"
        setup_keys_bitwarden_ssh_keys_collection_id: "{{ bitwarden.sshKeysCollectionId }}"
        setup_keys_bitwarden_gpg_keys_collection_id: "{{ bitwarden.gpgKeysCollectionId }}"

    - name: Setup configuration
      ansible.builtin.import_role:
        name: setup_configuration
      vars:
        setup_configuration_locale: "{{ locale }}"
        setup_configuration_timezone: "{{ timezone }}"
        setup_configuration_web_browser: "{{ web_browser }}"
        setup_configuration_favorites: "{{ favorites }}"
      tags: [configuration, user]

    - name: Setup dev basics
      ansible.builtin.import_role:
        name: setup_dev
      tags: [dev-basics, user]
