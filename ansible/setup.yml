---
- name: Apply ubuntu-config v1
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    ubuntu_config_use_become: >-
      {{ lookup('env', 'UBUNTU_CONFIG_USE_BECOME') |
      default('true', true) | bool }}

  tasks:
    - name: Normalize desired state schema
      ansible.builtin.set_fact:
        ubuntu_config_resolved: >-
          {{ ubuntu_config |
          neilime.ubuntu_config.normalized_ubuntu_config(ansible_env) }}

    - name: Apply system base configuration
      ansible.builtin.import_role:
        name: neilime.ubuntu_config.system_base

    - name: Apply APT package configuration
      ansible.builtin.import_role:
        name: neilime.ubuntu_config.apt_packages

    - name: Apply Flatpak desktop applications
      ansible.builtin.import_role:
        name: neilime.ubuntu_config.flatpak_apps

    - name: Apply primary browser configuration
      ansible.builtin.import_role:
        name: neilime.ubuntu_config.primary_browser

    - name: Apply GNOME desktop preferences
      ansible.builtin.import_role:
        name: neilime.ubuntu_config.gnome_preferences

    - name: Apply managed state markers
      ansible.builtin.import_role:
        name: neilime.ubuntu_config.managed_state
