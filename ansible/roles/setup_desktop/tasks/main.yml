---
# Desktop environment specific packages and configuration
- name: Add ucaresystem-core repository
  ansible.builtin.apt_repository:
    repo: "ppa:utappia/stable"
    state: present

- name: Add Helm APT repository key
  ansible.builtin.apt_key:
    url: "https://baltocdn.com/helm/signing.asc"
    state: present

- name: Add Helm APT repository
  ansible.builtin.apt_repository:
    repo: "deb https://baltocdn.com/helm/stable/debian/ all main"
    state: present

- name: Install desktop applications via APT
  ansible.builtin.apt:
    name: "{{ item }}"
    state: latest  # noqa package-latest
  loop: "{{ setup_desktop_packages }}"
