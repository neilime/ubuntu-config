---
# Default base system packages (host layer essentials)
setup_base_packages:
  # Core system
  - apt-transport-https
  - ca-certificates
  - gnupg-agent
  - software-properties-common
  - util-linux-extra
  - systemd
  - hwclock
  - dconf-cli
  # Essential tools
  - curl
  - wget
  - unzip
  - cron
  # Monitoring
  - htop