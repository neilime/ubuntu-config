---
name: Shared - Continuous Integration

"on":
  workflow_call:

permissions: {}

jobs:
  linter:
    # yamllint disable rule:line-length
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@4c9d51717dc04d823dac2dc9ac2857e7b3069454 # 0.35.0
    # yamllint enable rule:line-length
    permissions:
      actions: read
      contents: read
      security-events: write
      statuses: write

  build-tooling-image:
    # yamllint disable rule:line-length
    uses: hoverkraft-tech/ci-github-container/.github/workflows/docker-build-images.yml@2b647ed6f11d50cb6beb6d56333e68ba2c804826 # 0.33.1
    # yamllint enable rule:line-length
    permissions:
      contents: read
      id-token: write
      issues: read
      packages: write
      pull-requests: read
    with:
      oci-registry: ghcr.io
      sign: false
      images: |
        [
          {
            "name": "tooling",
            "context": ".",
            "dockerfile": "./docker/tooling/Dockerfile",
            "platforms": ["linux/amd64"]
          }
        ]
    secrets:
      oci-registry-password: ${{ secrets.GITHUB_TOKEN }}

  static:
    name: Static checks
    runs-on: ubuntu-latest
    needs: [linter, build-tooling-image]
    permissions:
      contents: read
      packages: read
    env:
      TOOLING_IMAGE: >-
        ${{ fromJSON(needs.build-tooling-image.outputs.built-images).tooling.images[0] }}
      TOOLING_IMAGE_PULL: "1"
    steps:
      - name: Checkout
        # yamllint disable rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # yamllint enable rule:line-length

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: make setup

      - name: Run Ansible syntax checks
        run: REPORTS_DIR=.reports make check-ansible

      - name: Run Ansible sanity and unit tests
        run: REPORTS_DIR=.reports make test

      - name: Parse static reports
        if: ${{ always() }}
        uses: hoverkraft-tech/ci-github-common/actions/parse-ci-reports@71b85947453f32b5d147ff3ab37351439a92d840 # 0.34.2
        with:
          report-paths: .reports/tests/*.xml
          report-name: Static Validation
          path-mapping: /workspace:.

  e2e:
    name: E2E validation
    needs: [static]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # yamllint disable rule:line-length
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # yamllint enable rule:line-length

      - name: Set up Lima
        id: lima-setup
        # yamllint disable rule:line-length
        uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1.1.0
        # yamllint enable rule:line-length

      - name: Cache Lima
        # yamllint disable rule:line-length
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        # yamllint enable rule:line-length
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-setup.outputs.version }}

      - name: Setup e2e stack
        env:
          E2E_REPOSITORY_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          make e2e-up
          make e2e-install

      - name: Run e2e tests
        run: REPORTS_DIR=.reports make e2e-test

      - name: Parse e2e reports
        if: ${{ always() }}
        uses: hoverkraft-tech/ci-github-common/actions/parse-ci-reports@71b85947453f32b5d147ff3ab37351439a92d840 # 0.34.2
        with:
          report-paths: .reports/tests/e2e-test.junit.xml
          report-name: End-to-End Validation

      - name: Stop e2e VM
        if: ${{ always() }}
        run: make e2e-down
