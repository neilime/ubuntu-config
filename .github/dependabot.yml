version: 2

updates:
  - package-ecosystem: github-actions
    open-pull-requests-limit: 20
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "devcontainers"
    open-pull-requests-limit: 20
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: "docker"
    open-pull-requests-limit: 20
    directories:
      - "/"
      - "/application/backend"
      - "/application/frontend"
    schedule:
      interval: "weekly"
    groups:
      docker-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    open-pull-requests-limit: 20
    directories:
      - "/docker/tooling"
      - "/e2e-tests"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
